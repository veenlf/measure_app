<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AR Measure Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            background: #007aff;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .measure-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
        }
        
        .crosshair {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .crosshair-inner {
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
        }
        
        .instruction {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
        }
        
        .distance-card {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 2px solid #4CAF50;
        }
        
        .distance-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        .distance-value {
            font-size: 36px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-size: 12px;
        }
        
        .history-section {
            background: #1a1a1a;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history-title {
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        
        .measurement-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #333;
            background: #222;
        }
        
        .button-section {
            padding: 16px;
            background: #111;
            display: flex;
            gap: 12px;
        }
        
        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            📏 AR Measure Tool
        </div>
        
        <div class="measure-area" id="measureArea">
            <div class="distance-card" id="distanceCard" style="display: none;">
                <div class="distance-label">LAST MEASUREMENT</div>
                <div class="distance-value" id="distanceValue">0.00 cm</div>
            </div>
            
            <div class="crosshair">
                <div class="crosshair-inner"></div>
            </div>
            <div class="instruction" id="instruction">
                Tap "Start" then tap anywhere to measure
            </div>
            
            <div class="status" id="status">
                Ready
            </div>
        </div>
        
        <div class="history-section" id="historySection" style="display: none;">
            <div class="history-title">📊 Recent Measurements</div>
            <div id="historyList"></div>
        </div>
        
        <div class="button-section">
            <button class="btn-primary" id="startBtn">🎯 Start</button>
            <button class="btn-secondary" id="clearBtn">🗑️ Clear</button>
        </div>
    </div>

    <script>
        let measurementStep = 0;
        let currentDistance = 0;
        let measurements = [];
        
        const measureArea = document.getElementById('measureArea');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');
        const distanceCard = document.getElementById('distanceCard');
        const distanceValue = document.getElementById('distanceValue');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        function updateHistory() {
            if (measurements.length > 0) {
                historySection.style.display = 'block';
                historyList.innerHTML = measurements.map(m => `
                    <div class="measurement-item">
                        <span>📏 ${m.distance.toFixed(1)} cm</span>
                        <span style="color: #888;">${m.time}</span>
                    </div>
                `).join('');
            } else {
                historySection.style.display = 'none';
            }
        }
        
        function startMeasurement() {
            measurementStep = 1;
            instruction.textContent = '📍 Tap to place Point A';
            status.textContent = 'Tap anywhere on the screen';
            startBtn.textContent = 'Measuring...';
            startBtn.style.opacity = '0.5';
            startBtn.disabled = true;
            distanceCard.style.display = 'none';
        }
        
        function resetMeasurement() {
            measurementStep = 0;
            instruction.textContent = 'Tap "Start" then tap anywhere to measure';
            status.textContent = 'Ready';
            startBtn.textContent = '🎯 Start';
            startBtn.style.opacity = '1';
            startBtn.disabled = false;
        }
        
        function clearAll() {
            measurements = [];
            currentDistance = 0;
            distanceCard.style.display = 'none';
            updateHistory();
            resetMeasurement();
            status.textContent = 'All measurements cleared';
            setTimeout(() => {
                if (measurementStep === 0) status.textContent = 'Ready';
            }, 2000);
        }
        
        measureArea.addEventListener('click', (e) => {
            e.stopPropagation();
            
            if (measurementStep === 1) {
                measurementStep = 2;
                instruction.textContent = '📍 Tap to place Point B';
                status.textContent = 'Point A placed. Tap again for Point B';
            } 
            else if (measurementStep === 2) {
                const simulatedDistance = 15 + Math.random() * 50;
                currentDistance = simulatedDistance;
                
                measurements.unshift({
                    distance: currentDistance,
                    time: new Date().toLocaleTimeString()
                });
                
                distanceValue.textContent = currentDistance.toFixed(1) + ' cm';
                distanceCard.style.display = 'block';
                instruction.textContent = '✓ Measurement complete!';
                status.textContent = `${currentDistance.toFixed(1)} cm measured`;
                
                updateHistory();
                resetMeasurement();
                
                setTimeout(() => {
                    if (measurementStep === 0) {
                        distanceCard.style.display = 'none';
                    }
                }, 3000);
            }
        });
        
        startBtn.addEventListener('click', startMeasurement);
        clearBtn.addEventListener('click', clearAll);
    </script>
</body>
</html>
